<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ambulance Routing System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC_T6tfk_05jELHSy6iRXd5eQ7RfoXVJM8&libraries=places"></script>
  
  <link id="theme-stylesheet" rel="stylesheet" href="style.css">

  <script>
    // This script runs immediately to set the theme before the page loads
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.getElementById('theme-stylesheet').href = savedTheme === 'light' ? 'style1.css' : 'style.css';
  </script>
</head>

<body>
  <div class="container mt-4">
    <div class="header text-center p-4 rounded">
        <div class="d-flex justify-content-between align-items-center">
            <div style="width: 50px;"></div>
            <div>
                <h1>🚑 AI-Based Ambulance Routing</h1>
                <p>Optimized routes based on patient threat level, hospital beds & wait time</p>
            </div>
            <button id="theme-toggle-btn" class="btn" onclick="toggleTheme()" style="width: 50px; border: 1px solid #444;">☀️</button>
        </div>
    </div>

    <div class="form-section mt-4 p-4 shadow rounded">
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label for="threatLevel" class="form-label">Filter by Threat Level:</label>
                <select class="form-select" id="threatLevel" onchange="applyFilters()">
                    <option value="low">Low (Show All)</option>
                    <option value="medium">Medium (Urgent)</option>
                    <option value="high">High (Life-Threatening)</option>
                </select>
            </div>
            <div class="col-12 col-md-6">
                <label for="sortBy" class="form-label">Sort By:</label>
                <select class="form-select" id="sortBy" onchange="applyFilters()">
                    <option value="distance">Nearest Hospital</option>
                    <option value="beds">Most Beds Available</option>
                    <option value="wait">Shortest Wait Time</option>
                </select>
            </div>
            <div class="col-12">
                <button class="btn btn-primary w-100 mt-2" onclick="getUserLocation()">
                    📍 Use My Current Location
                </button>
            </div>
        </div>
    </div>

    <div class="mt-4" id="map" style="height: 400px; border-radius: 0.5rem;"></div>

    <div class="mt-4">
      <h4>Nearby Hospitals</h4>
      <div id="hospitals"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
